<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de API de Visión | CasitaApps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkerboard {
            background-color: #f0f0f0;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc),
                              linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .drag-active { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        
        /* Safe View toggling without destroying Canvas Layout bounds */
        .view-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: opacity 0.2s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .view-hidden { opacity: 0; pointer-events: none; z-index: -1; }
        .view-active { opacity: 1; pointer-events: auto; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 shadow-sm z-20">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">V</div>
                <h1 class="text-xl font-bold">Prueba de API de Visión</h1>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-1">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 class="font-bold text-lg mb-4">Entrada de imagen</h2>
                <div id="dropzone" class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:bg-slate-50 transition relative group">
                    <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <svg class="w-10 h-10 mx-auto text-slate-400 group-hover:text-blue-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <p class="text-sm font-medium">Arrastre y suelte una imagen de perfil</p>
                </div>
                <div class="flex items-center gap-3 my-4">
                    <hr class="flex-1 border-slate-200"><span class="text-xs text-slate-400 font-bold uppercase">o</span><hr class="flex-1 border-slate-200">
                </div>
                <div class="flex gap-2">
                    <input type="text" id="urlInput" placeholder="Pegue el enlace de la imagen..." class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="analyzeImage()" id="analyzeBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">Analizar</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[400px]">
                <div class="bg-slate-800 px-4 py-3 border-b border-slate-900">
                    <h2 class="font-bold text-sm text-slate-200">Respuesta de la API</h2>
                </div>
                <div class="bg-slate-900 flex-1 overflow-auto p-4">
                    <pre id="jsonOutput" class="text-xs text-green-400 font-mono">Esperando...</pre>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[750px]">
            <div class="flex border-b border-slate-200 px-6 pt-4 gap-6 text-sm font-medium">
                <button onclick="switchTab('vision')" id="tab-vision" class="pb-3 tab-active">Superposiciones visuales</button>
                <button onclick="switchTab('background')" id="tab-background" class="pb-3 text-slate-500">Reemplazo de fondo</button>
            </div>

            <div class="flex-1 bg-slate-100 relative overflow-hidden p-6">
                
                <p id="placeholder" class="text-slate-400 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0 font-medium">Suba una imagen para ver los resultados</p>

                <!-- TAB 1: Vision Overlays -->
                <div id="vision-view" class="view-layer view-hidden">
                    <div class="relative inline-block max-h-full max-w-full">
                        <img id="sourceImage" class="max-h-[600px] max-w-full object-contain rounded shadow-md block" crossorigin="anonymous">
                        <canvas id="overlayCanvas" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
                    </div>
                </div>

                <!-- TAB 2: Background Swapper -->
                <div id="background-view" class="view-layer view-hidden">
                    <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur rounded-full shadow-lg px-2 py-2 flex gap-2 z-20 border border-slate-200">
                        <button onclick="setBg('checkerboard')" class="w-8 h-8 rounded-full border border-slate-300 checkerboard ring-2 ring-offset-1 ring-blue-500 hover:scale-110 transition"></button>
                        <button onclick="setBg('#3b82f6')" class="w-8 h-8 rounded-full bg-blue-500 hover:scale-110 transition"></button>
                        <button onclick="setBg('#10b981')" class="w-8 h-8 rounded-full bg-emerald-500 hover:scale-110 transition"></button>
                        <button onclick="setBg('url(https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80)')" class="w-8 h-8 rounded-full hover:scale-110 transition bg-cover bg-center" style="background-image: url(https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=100&q=80);"></button>
                    </div>
                    <div id="bgCanvasContainer" class="checkerboard rounded-lg shadow-2xl overflow-hidden mt-10 inline-block max-h-[600px] max-w-full relative transition-all duration-300">
                        <canvas id="compositeCanvas" class="max-h-[600px] max-w-full block"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        let currentFile = null;
        let lastApiData = null;
        let currentBgStyle = 'checkerboard';
        const serverUrl = window.location.origin !== "null" ? window.location.origin : "http://127.0.0.1:8000";

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-active'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-active'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) {
                currentFile = e.dataTransfer.files[0];
                document.getElementById('urlInput').value = ''; 
                analyzeImage();
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                currentFile = fileInput.files[0];
                document.getElementById('urlInput').value = '';
                analyzeImage();
            }
        });

        function switchTab(tab) {
            document.getElementById('tab-vision').classList.replace('tab-active', 'text-slate-500');
            document.getElementById('tab-background').classList.replace('tab-active', 'text-slate-500');
            document.getElementById('tab-' + tab).classList.replace('text-slate-500', 'tab-active');
            
            document.getElementById('vision-view').className = 'view-layer view-hidden';
            document.getElementById('background-view').className = 'view-layer view-hidden';
            
            document.getElementById(tab + '-view').className = 'view-layer view-active';

            // Slight delay ensures the DOM layout is computed before drawing
            setTimeout(() => {
                if (lastApiData) {
                    if(tab === 'vision') drawVisionOverlays(lastApiData);
                    if(tab === 'background') setBg(currentBgStyle);
                }
            }, 50);
        }

        async function analyzeImage() {
            const urlInput = document.getElementById('urlInput').value;
            if (!currentFile && !urlInput) return alert("Por favor, proporcione un archivo o enlace de imagen.");

            const btn = document.getElementById('analyzeBtn');
            const output = document.getElementById('jsonOutput');
            const img = document.getElementById('sourceImage');

            btn.disabled = true;
            output.innerText = "Analizando...";
            document.getElementById('placeholder').style.display = 'none';
            switchTab('vision');

            try {
                const formData = new FormData();
                if (currentFile && !urlInput) formData.append("file", currentFile);
                else formData.append("imageUrl", urlInput);

                const response = await fetch(`${serverUrl}/analyze`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error(`El servidor respondió con código ${response.status}`);

                const data = await response.json();
                lastApiData = data;
                output.innerText = JSON.stringify(data, null, 2);

                if (data.ok) {
                    // Fetch original image directly from OUR backend to completely bypass Tainted Canvas CORS
                    img.src = `${serverUrl}/image/${data.imageKey}`;
                    
                    img.onload = () => {
                        drawVisionOverlays(data);
                        if(data.maskAvailable) buildCompositedBackground(img, data.maskUrl);
                    };
                } else {
                    alert("El análisis falló: " + data.error);
                }
            } catch (err) {
                output.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
                currentFile = null; 
            }
        }

        function drawVisionOverlays(data) {
            const img = document.getElementById('sourceImage');
            const canvas = document.getElementById('overlayCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const drawBox = (box, color, lineWidth, dashed=false) => {
                if (!box) return;
                const x = box.xMin * canvas.width;
                const y = box.yMin * canvas.height;
                const w = (box.xMax - box.xMin) * canvas.width;
                const h = (box.yMax - box.yMin) * canvas.height;
                
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                if (dashed) ctx.setLineDash([10, 10]);
                else ctx.setLineDash([]);
                ctx.rect(x, y, w, h);
                ctx.stroke();
                
                if (color === '#ef4444') {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                    ctx.fill();
                }
            };

            if (data.faceBox) drawBox(data.faceBox, '#3b82f6', 3); 
            if (data.cropBox) drawBox(data.cropBox, '#22c55e', 2, true); 
            if (data.eyeBoxes) {
                drawBox(data.eyeBoxes.leftEye, '#ef4444', 2); 
                drawBox(data.eyeBoxes.rightEye, '#ef4444', 2); 
            }
        }

        let extractedForegroundCanvas = null;

        function buildCompositedBackground(originalImg, maskUrl) {
            const maskImg = new Image();
            maskImg.crossOrigin = "anonymous";
            
            maskImg.onload = () => {
                const offCanvas = document.createElement('canvas');
                offCanvas.width = originalImg.naturalWidth;
                offCanvas.height = originalImg.naturalHeight;
                const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

                offCtx.drawImage(originalImg, 0, 0, offCanvas.width, offCanvas.height);
                const imgData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);

                offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
                offCtx.drawImage(maskImg, 0, 0, offCanvas.width, offCanvas.height);
                const maskData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);

                for (let i = 0; i < imgData.data.length; i += 4) {
                    imgData.data[i + 3] = maskData.data[i]; 
                }

                extractedForegroundCanvas = document.createElement('canvas');
                extractedForegroundCanvas.width = offCanvas.width;
                extractedForegroundCanvas.height = offCanvas.height;
                extractedForegroundCanvas.getContext('2d').putImageData(imgData, 0, 0);

                setBg('checkerboard');
            };
            maskImg.src = maskUrl;
        }

        function setBg(bgStyle) {
            currentBgStyle = bgStyle;
            if (!extractedForegroundCanvas) return;
            
            const container = document.getElementById('bgCanvasContainer');
            const finalCanvas = document.getElementById('compositeCanvas');
            
            // Set canvas size
            finalCanvas.width = extractedForegroundCanvas.width;
            finalCanvas.height = extractedForegroundCanvas.height;

            if (bgStyle === 'checkerboard') {
                container.className = 'checkerboard rounded-lg shadow-2xl overflow-hidden mt-10 inline-block max-h-[600px] max-w-full relative transition-all duration-300';
                container.style.background = '';
            } else {
                container.className = 'rounded-lg shadow-2xl overflow-hidden mt-10 inline-block max-h-[600px] max-w-full relative transition-all duration-300';
                container.style.background = bgStyle;
                if(bgStyle.includes('url')) {
                    container.style.backgroundSize = 'cover';
                    container.style.backgroundPosition = 'center';
                }
            }

            finalCanvas.getContext('2d').clearRect(0, 0, finalCanvas.width, finalCanvas.height);
            finalCanvas.getContext('2d').drawImage(extractedForegroundCanvas, 0, 0);
        }
    </script>
</body>
</html>
